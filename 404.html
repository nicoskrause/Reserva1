<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Underground Representações</title>
  <meta http-equiv="refresh" content="3;url=/">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0e;
      color: #fff;
      font-family: "DM Sans", system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 400px; }
    .code {
      font-size: 5rem;
      font-family: Georgia, serif;
      color: #b8995a;
      line-height: 1;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 400;
      color: rgba(255,255,255,.7);
      margin-bottom: 1.5rem;
    }
    a {
      display: inline-block;
      padding: .6rem 1.4rem;
      background: #b8995a;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: .9rem;
      font-weight: 500;
    }
    .note {
      margin-top: 1rem;
      font-size: .75rem;
      color: rgba(255,255,255,.25);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Página não encontrada</h1>
    <a href="/">Voltar ao sistema</a>
    <p class="note">Redirecionando automaticamente em 3 segundos…</p>
  </div>
</body>
</html>
